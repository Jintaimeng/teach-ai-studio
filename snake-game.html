<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #e94560;
            letter-spacing: 2px;
        }

        .score-board {
            display: flex;
            gap: 20px;
        }

        .score-item {
            background: #16213e;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 16px;
            border: 1px solid #0f3460;
        }

        .score-item span {
            color: #e94560;
            font-weight: bold;
            font-size: 20px;
        }

        #gameCanvas {
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .controls-info {
            background: #16213e;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            font-size: 14px;
            color: #888;
            width: 400px;
            text-align: center;
        }

        .controls-info kbd {
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 4px;
            color: #e94560;
            font-family: monospace;
        }

        .overlay {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            pointer-events: none;
        }

        .overlay.active {
            pointer-events: auto;
        }

        .overlay-text {
            font-size: 36px;
            font-weight: 700;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .overlay-sub {
            font-size: 18px;
            color: #aaa;
        }

        .btn {
            background: #e94560;
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn:hover {
            background: #c73652;
            transform: scale(1.05);
        }

        .speed-selector {
            display: flex;
            gap: 8px;
        }

        .speed-btn {
            background: #0f3460;
            color: #888;
            padding: 6px 14px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .speed-btn.active,
        .speed-btn:hover {
            background: #e94560;
            color: white;
            border-color: #e94560;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">🐍 贪吃蛇</div>
            <div class="score-board">
                <div class="score-item">得分: <span id="score">0</span></div>
                <div class="score-item">最高: <span id="highScore">0</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls-info">
            使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向 | <kbd>空格</kbd> 开始/暂停
        </div>

        <div class="speed-selector">
            <button class="speed-btn" data-speed="150">慢速</button>
            <button class="speed-btn active" data-speed="100">中速</button>
            <button class="speed-btn" data-speed="60">快速</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let gameSpeed = 100;
        let gameLoop = null;

        // 初始化显示最高分
        document.getElementById('highScore').textContent = highScore;

        // 速度选择
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameSpeed = parseInt(btn.dataset.speed);
                if (gameRunning && !gamePaused) {
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            });
        });

        // 初始化游戏
        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            gamePaused = false;
            document.getElementById('score').textContent = score;
            placeFood();
        }

        // 放置食物
        function placeFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        // 游戏步进
        function gameStep() {
            if (gamePaused || gameOver) return;

            direction = nextDirection;

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 碰墙检测
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // 碰自身检测
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > highScore) {
                    highScore = score;
                    document.getElementById('highScore').textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        // 绘制画面
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（淡淡的）
            ctx.strokeStyle = 'rgba(15, 52, 96, 0.3)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e94560';
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                const ratio = index / snake.length;
                const r = Math.round(233 - ratio * 100);
                const g = Math.round(69 + ratio * 40);
                const b = Math.round(96 + ratio * 60);
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;

                if (index === 0) {
                    // 蛇头 - 圆角更大，加阴影
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#e94560';
                }

                const padding = index === 0 ? 1 : 2;
                const radius = index === 0 ? 6 : 4;
                roundRect(
                    ctx,
                    segment.x * CELL_SIZE + padding,
                    segment.y * CELL_SIZE + padding,
                    CELL_SIZE - padding * 2,
                    CELL_SIZE - padding * 2,
                    radius
                );
                ctx.fill();
                ctx.shadowBlur = 0;

                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    let eye1, eye2;
                    const cx = segment.x * CELL_SIZE + CELL_SIZE / 2;
                    const cy = segment.y * CELL_SIZE + CELL_SIZE / 2;

                    if (direction.x === 1) {
                        eye1 = { x: cx + 4, y: cy - 4 };
                        eye2 = { x: cx + 4, y: cy + 4 };
                    } else if (direction.x === -1) {
                        eye1 = { x: cx - 4, y: cy - 4 };
                        eye2 = { x: cx - 4, y: cy + 4 };
                    } else if (direction.y === -1) {
                        eye1 = { x: cx - 4, y: cy - 4 };
                        eye2 = { x: cx + 4, y: cy - 4 };
                    } else {
                        eye1 = { x: cx - 4, y: cy + 4 };
                        eye2 = { x: cx + 4, y: cy + 4 };
                    }

                    ctx.beginPath();
                    ctx.arc(eye1.x, eye1.y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2.x, eye2.y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // 游戏结束覆盖层
            if (gameOver) {
                ctx.fillStyle = 'rgba(26, 26, 46, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 36px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - 40);

                ctx.fillStyle = '#eee';
                ctx.font = '20px "Segoe UI"';
                ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 10);

                ctx.fillStyle = '#aaa';
                ctx.font = '16px "Segoe UI"';
                ctx.fillText('按空格键重新开始', canvas.width / 2, canvas.height / 2 + 50);
            }

            // 暂停覆盖层
            if (gamePaused && !gameOver) {
                ctx.fillStyle = 'rgba(26, 26, 46, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 30px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText('暂停', canvas.width / 2, canvas.height / 2 - 10);

                ctx.fillStyle = '#aaa';
                ctx.font = '16px "Segoe UI"';
                ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + 30);
            }

            // 开始界面
            if (!gameRunning) {
                ctx.fillStyle = 'rgba(26, 26, 46, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 36px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText('🐍 贪吃蛇', canvas.width / 2, canvas.height / 2 - 30);

                ctx.fillStyle = '#eee';
                ctx.font = '18px "Segoe UI"';
                ctx.fillText('按空格键开始游戏', canvas.width / 2, canvas.height / 2 + 20);

                ctx.fillStyle = '#888';
                ctx.font = '14px "Segoe UI"';
                ctx.fillText('方向键 / WASD 控制移动', canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        // 圆角矩形辅助
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // 游戏结束
        function endGame() {
            gameOver = true;
            gameRunning = false;
            clearInterval(gameLoop);
            draw();
        }

        // 开始游戏
        function startGame() {
            initGame();
            gameRunning = true;
            clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
            draw();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            // 空格 - 开始/暂停/重新开始
            if (key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning || gameOver) {
                    startGame();
                } else {
                    gamePaused = !gamePaused;
                    draw();
                }
                return;
            }

            if (!gameRunning || gamePaused || gameOver) return;

            // 方向控制（防止反向移动）
            if ((key === 'arrowup' || key === 'w') && direction.y !== 1) {
                nextDirection = { x: 0, y: -1 };
            } else if ((key === 'arrowdown' || key === 's') && direction.y !== -1) {
                nextDirection = { x: 0, y: 1 };
            } else if ((key === 'arrowleft' || key === 'a') && direction.x !== 1) {
                nextDirection = { x: -1, y: 0 };
            } else if ((key === 'arrowright' || key === 'd') && direction.x !== -1) {
                nextDirection = { x: 1, y: 0 };
            }
        });

        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
